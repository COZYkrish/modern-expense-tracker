<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Expense Tracker</title>

    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/animations.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />

    <style>
        :root {
            --page-bg:
                radial-gradient(circle at 15% 20%, rgba(0, 255, 194, 0.14), transparent 28%),
                radial-gradient(circle at 82% 18%, rgba(96, 165, 250, 0.18), transparent 24%),
                radial-gradient(circle at 50% 80%, rgba(14, 165, 233, 0.12), transparent 30%),
                linear-gradient(135deg, #040814 0%, #07111f 42%, #02050c 100%);
            --panel-border: rgba(148, 163, 184, 0.18);
            --line-soft: rgba(148, 163, 184, 0.14);
            --cyan: #4df6d2;
            --sky: #67b8ff;
            --ink: #b8c7da;
            --white: #f3f7ff;
            --max-width: 1200px;
            --spot-x: 50%;
            --spot-y: 20%;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Space Grotesk", sans-serif;
            color: var(--white);
            background: var(--page-bg);
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at var(--spot-x) var(--spot-y), rgba(103, 184, 255, 0.18), transparent 16%),
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: auto, 72px 72px, 72px 72px;
            pointer-events: none;
            opacity: 0.7;
            z-index: 0;
        }

        body::after {
            content: "";
            position: fixed;
            inset: auto -10% -28% auto;
            width: 540px;
            height: 540px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(77, 246, 210, 0.14), transparent 62%);
            filter: blur(30px);
            pointer-events: none;
            z-index: 0;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        img {
            max-width: 100%;
            display: block;
        }

        .page-shell {
            position: relative;
            z-index: 1;
        }

        .nav {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            width: min(var(--max-width), calc(100% - 32px));
            margin: 18px auto 0;
            padding: 14px 18px;
            border: 1px solid var(--panel-border);
            border-radius: 20px;
            background: rgba(5, 10, 22, 0.72);
            backdrop-filter: blur(20px);
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
        }

        .logo-wrap {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-badge {
            width: 42px;
            height: 42px;
            display: grid;
            place-items: center;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(77, 246, 210, 0.16), rgba(103, 184, 255, 0.16));
            border: 1px solid rgba(103, 184, 255, 0.22);
            color: var(--cyan);
            font-size: 1rem;
            box-shadow: inset 0 0 24px rgba(77, 246, 210, 0.08);
        }

        .logo {
            font-family: "Orbitron", sans-serif;
            font-weight: 800;
            font-size: 1rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .logo-sub {
            display: block;
            margin-top: 2px;
            color: var(--ink);
            font-size: 0.72rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-left: auto;
        }

        .nav-link,
        .user-chip {
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid transparent;
            color: var(--ink);
            transition: 0.25s ease;
        }

        .nav-link:hover,
        .user-chip:hover {
            color: var(--white);
            border-color: rgba(103, 184, 255, 0.18);
            background: rgba(103, 184, 255, 0.08);
        }

        .user-chip {
            min-width: 128px;
            text-align: center;
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.08);
        }

        .btn-primary,
        .btn-ghost {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-height: 50px;
            padding: 0 22px;
            border-radius: 16px;
            font-weight: 700;
            letter-spacing: 0.03em;
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease, background 0.25s ease;
        }

        .btn-primary {
            color: #03111c;
            background: linear-gradient(135deg, var(--cyan), #91f6ff 55%, var(--sky));
            box-shadow: 0 14px 34px rgba(77, 246, 210, 0.24);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 42px rgba(77, 246, 210, 0.34);
        }

        .btn-ghost {
            color: var(--white);
            border: 1px solid rgba(103, 184, 255, 0.2);
            background: rgba(255, 255, 255, 0.04);
        }

        .btn-ghost:hover {
            transform: translateY(-2px);
            border-color: rgba(77, 246, 210, 0.3);
            background: rgba(77, 246, 210, 0.08);
        }
    </style>
</head>
<body class="page-enter">
    <div class="page-shell"></div>
</html>
