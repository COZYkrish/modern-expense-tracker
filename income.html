<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Income | SmartTracker</title>

    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/dashboard.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />

    <script src="js/session.js"></script>
    <script src="js/protected-page.js"></script>
</head>
<body class="page-enter">
    <aside class="sidebar">
        <h2 class="logo">SmartTracker</h2>
        <div class="user-box">
            <span class="user-name" id="userName"></span>
        </div>

        <nav class="menu">
            <a href="dashboard.html">Dashboard</a>
            <a href="expenses.html">Expenses</a>
            <a class="active" href="income.html">Income</a>
            <a href="analytics.html">Analytics</a>
            <a href="budget.html">Budget</a>
            <a href="settings.html">Settings</a>
        </nav>
    </aside>

    <main class="dashboard-main">
        <header class="dashboard-header">
            <div>
                <h1>Income Flow</h1>
                <p>Track salary, freelance, and other earning sources in the same transaction system as the dashboard.</p>
            </div>

            <button class="btn btn-primary" id="addIncomeBtn" type="button">
                Add Income
            </button>
        </header>

        <section class="card">
            <div class="section-header">
                <h3>Income Records</h3>
            </div>
            <div id="incomeList">
                <p class="text-muted">No income added yet</p>
            </div>
        </section>
    </main>

    <div id="incomeModal" class="modal">
        <div class="modal-content">
            <h3>Add Income</h3>
            <input id="incomeTitle" type="text" placeholder="Income source" />
            <input id="incomeAmount" type="number" placeholder="Amount" />

            <select id="incomeCategory">
                <option value="Salary">Salary</option>
                <option value="Freelance">Freelance</option>
                <option value="Business">Business</option>
                <option value="Investment">Investment</option>
                <option value="Other">Other</option>
            </select>

            <div class="modal-actions">
                <button id="saveIncomeBtn" class="btn btn-primary" type="button">Save</button>
                <button id="cancelIncomeBtn" class="btn-outline" type="button">Cancel</button>
            </div>
        </div>
    </div>

    <nav class="mobile-nav">
        <a href="dashboard.html">Home</a>
        <a href="expenses.html">Expense</a>
        <a class="active" href="income.html">Income</a>
        <a href="analytics.html">Stats</a>
        <a href="budget.html">Budget</a>
        <a href="settings.html">Settings</a>
        <button type="button" onclick="window.AuthSession.logout('auth/login.html')">Logout</button>
    </nav>

    <script src="js/income.js" defer></script>
</body>
</html>
