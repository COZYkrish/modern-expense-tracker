<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expenses | SmartTracker</title>

    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/dashboard.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />

    <script src="js/session.js"></script>
    <script src="js/protected-page.js"></script>
</head>
<body class="page-enter">
    <aside class="sidebar">
        <h2 class="logo">SmartTracker</h2>
        <div class="user-box">
            <span class="user-name" id="userName"></span>
        </div>

        <nav class="menu">
            <a href="dashboard.html">Dashboard</a>
            <a class="active" href="expenses.html">Expenses</a>
            <a href="income.html">Income</a>
            <a href="analytics.html">Analytics</a>
            <a href="budget.html">Budget</a>
            <a href="settings.html">Settings</a>
        </nav>
    </aside>

    <main class="dashboard-main">
        <header class="dashboard-header">
            <div>
                <h1>Expense Stream</h1>
                <p>Add and review expense transactions that feed the dashboard, analytics, and budget pages.</p>
            </div>

            <button class="btn btn-primary" type="button" onclick="openExpenseModal()">
                Add Expense
            </button>
        </header>

        <section class="card">
            <div class="section-header">
                <h3>Expense Records</h3>
            </div>
            <div class="expense-list"></div>
        </section>
    </main>

    <div id="expenseModal" class="modal">
        <div class="modal-content">
            <h3>Add Expense</h3>
            <input id="expenseTitle" type="text" placeholder="Expense title" />
            <input id="expenseAmount" type="number" placeholder="Amount" />

            <select id="expenseCategory">
                <option value="Food">Food</option>
                <option value="Rent">Rent</option>
                <option value="Transport">Transport</option>
                <option value="Shopping">Shopping</option>
                <option value="Utilities">Utilities</option>
                <option value="Other">Other</option>
            </select>

            <div class="modal-actions">
                <button class="btn btn-primary" type="button" onclick="saveExpense()">Save Expense</button>
                <button class="btn-outline" type="button" onclick="closeExpenseModal()">Cancel</button>
            </div>
        </div>
    </div>

    <nav class="mobile-nav">
        <a href="dashboard.html">Home</a>
        <a class="active" href="expenses.html">Expense</a>
        <a href="income.html">Income</a>
        <a href="analytics.html">Stats</a>
        <a href="budget.html">Budget</a>
        <a href="settings.html">Settings</a>
        <button type="button" onclick="window.AuthSession.logout('auth/login.html')">Logout</button>
    </nav>

    <script src="js/expenses.js" defer></script>
</body>
</html>
