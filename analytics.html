<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Analytics | SmartTracker</title>

    <!-- STYLES -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/dashboard.css">

    <!-- FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- CHART.JS (ONCE ONLY) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="page-enter">

<aside class="sidebar">
    <h2 class="logo">💸 SmartTracker</h2>
    <div class="user-box">
    <span class="user-name" id="userName"></span>
</div>

    <nav class="menu">
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="expenses.html">🧾 Expenses</a>
        <a href="income.html">💰 Income</a>
        <a class="active" href="analytics.html">📈 Analytics</a>
        <a href="budget.html">🎯 Budget</a>
        <a href="settings.html">⚙ Settings</a>
    </nav>
</aside>

<main class="dashboard-main">

    <header class="dashboard-header">
        <div>
            <h1>Analytics</h1>
            <p class="text-muted">Visual insights into your finances</p>
        </div>
    </header>

    <!-- KPI CARDS -->
    <section class="kpis">
        <div class="card glow">
            <p class="label">Total Spent</p>
            <h2 id="totalSpent">₹0</h2>
        </div>

        <div class="card glow">
            <p class="label">Highest Category</p>
            <h2 id="highestCategory">—</h2>
        </div>

        <div class="card glow">
            <p class="label">Monthly Growth</p>
            <h2 id="monthlyGrowth">0%</h2>
        </div>
    </section>

    <!-- CHARTS -->
    <section class="analytics-grid">
        <div class="card chart-card">
            <h3>Expense Trend</h3>
            <canvas id="expenseChart"></canvas>
        </div>

        <div class="card chart-card">
            <h3>Category Breakdown</h3>
            <canvas id="categoryChart"></canvas>
        </div>
    </section>

</main>

<!-- DATA + CHART LOGIC -->
<script src="js/session.js"></script>
<script src="js/protected-page.js"></script>
<script src="js/analyticsData.js"></script>
<script src="js/charts.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const { totalSpent, highestCategory, growth } = getAnalyticsKPIs();

    document.getElementById("totalSpent").innerText = `₹${totalSpent}`;
    document.getElementById("highestCategory").innerText = highestCategory;
    document.getElementById("monthlyGrowth").innerText =
        `${growth > 0 ? "+" : ""}${growth}%`;

    updateCharts();
});
</script>
<div class="mobile-nav">
  <a href="dashboard.html">📊</a>
  <a href="expenses.html">💸</a>
  <a href="income.html">💰</a>
  <a href="analytics.html">📈</a>
</div>

</body>
</html>
